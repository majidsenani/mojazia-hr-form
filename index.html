<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع شركة صندوق مجزية العقاري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #2c3e50; }
        .container { max-width: 650px; background: #ffffff; margin: auto; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); border-top: 10px solid #b8860b; }
        h2 { text-align: center; color: #b8860b; margin-bottom: 25px; font-weight: 700; }
        .form-section-title { font-weight: 700; color: #b8860b; margin-top: 25px; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 7px; font-weight: 700; color: #34495e; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #dce4ec; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo'; font-size: 15px; }
        input:focus, select:focus { border-color: #b8860b; outline: none; }
        .static-field { background-color: #f1f3f5; color: #7f8c8d; cursor: not-allowed; font-weight: bold; }
        .iban-wrapper { display: flex; align-items: center; direction: ltr; }
        .iban-prefix { padding: 12px; background: #ecf0f1; border: 1.5px solid #dce4ec; border-right: none; border-radius: 8px 0 0 8px; font-weight: bold; }
        .iban-input { border-radius: 0 8px 8px 0; }
        button { width: 100%; padding: 15px; background-color: #b8860b; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.4s; margin-top: 25px; }
        button:hover { background-color: #946d0a; transform: translateY(-2px); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .row-2-col { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 500px) { .row-2-col { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h2>مشروع شركة صندوق مجزية العقاري</h2>
    
    <form id="employeeForm">
        <div class="form-section-title">الاسم باللغة العربية (إلزامي)</div>
        <div class="row-2-col">
            <div class="form-group">
                <label>الاسم الأول</label>
                <input type="text" name="firstName" required>
            </div>
            <div class="form-group">
                <label>اسم العائلة</label>
                <input type="text" name="lastName" required>
            </div>
        </div>
        <div class="form-group">
            <label>الأسماء الوسطى (الأب والجد)</label>
            <input type="text" name="middleNames" required>
        </div>

        <div class="form-section-title">English Name (Mandatory)</div>
        <div class="row-2-col">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="englishFirstName" required style="direction: ltr;">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="englishLastName" required style="direction: ltr;">
            </div>
        </div>
        <div class="form-group">
            <label>Middle Names</label>
            <input type="text" name="englishMiddleNames" required style="direction: ltr;">
        </div>

        <div class="form-section-title">البيانات الشخصية والبنكية</div>
        <div class="row-2-col">
            <div class="form-group">
                <label>رقم الهوية</label>
                <input type="text" name="idNumber" pattern="\d{10}" required maxlength="10">
            </div>
            <div class="form-group">
                <label>تاريخ الميلاد (ميلادي)</label>
                <input type="date" name="dob" required>
            </div>
        </div>

        <div class="form-group">
            <label>البنك</label>
            <select name="bankName" id="bankSelect" required>
                <option value="">اختر البنك</option>
                <option value="ALBI">بنك البلاد</option>
                <option value="NCBK">البنك السعودي الوطني (SNB)</option>
                <option value="RIBL">بنك الرياض</option>
                <option value="RJHI">مصرف الراجحي</option>
                <option value="INMA">مصرف الإنماء</option>
                <option value="BSFR">البنك السعودي الفرنسي</option>
                <option value="SABB">بنك ساب (SAB)</option>
                <option value="ARNB">البنك العربي الوطني</option>
                <option value="GINT">بنك الخليج الدولي</option>
                <option value="SIBC">البنك السعودي للاستثمار</option>
                <option value="BJAZ">بنك الجزيرة</option>
                <option value="ENBD">بنك الإمارات دبي الوطني</option>
            </select>
        </div>

        <div class="form-group">
            <label>رقم الآيبان (IBAN)</label>
            <div class="iban-wrapper">
                <span class="iban-prefix">SA</span>
                <input type="text" name="iban" class="iban-input" required maxlength="22" pattern="\d{22}" placeholder="أدخل 22 رقماً">
            </div>
        </div>

        <div class="row-2-col">
            <div class="form-group">
                <label>الجنسية</label>
                <input type="text" name="nationality" value="SAU" class="static-field" readonly>
            </div>
            <div class="form-group">
                <label>موقع العمل</label>
                <input type="text" name="workLocation" value="الرياض" class="static-field" readonly>
            </div>
        </div>

        <div class="row-2-col">
            <div class="form-group">
                <label>الديانة</label>
                <input type="text" name="religion" value="مسلم" class="static-field" readonly>
            </div>
            <div class="form-group">
                <label>الجنس</label>
                <select name="gender" required>
                    <option value="">اختر</option>
                    <option value="ذكر">ذكر</option>
                    <option value="أنثى">أنثى</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>الحالة الاجتماعية</label>
            <select name="maritalStatus" required>
                <option value="">اختر</option>
                <option value="أعزب/عزباء">أعزب/عزباء</option>
                <option value="متزوج">متزوج</option>
            </select>
        </div>

        <div class="row-2-col">
            <div class="form-group">
                <label>الإيميل</label>
                <input type="email" name="email" required style="direction: ltr;">
            </div>
            <div class="form-group">
                <label>رقم الجوال</label>
                <input type="tel" name="phone" pattern="05\d{8}" required maxlength="10" placeholder="05xxxxxxxx">
            </div>
        </div>

        <button type="submit" id="submitBtn">إرسال البيانات للنظام</button>
    </form>
</div>

<script>
// الرابط الأخير الذي زودتني به
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzD8CeaYfOrfCYTAHbK7JPaBZEluOLsDjEmVd0BRwjeRdbyjrsY4RYdbdy_O_geFDe3/exec";

document.getElementById('employeeForm').onsubmit = function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.innerText = "جاري الحفظ في النظام...";
    btn.disabled = true;

    const form = e.target;
    const formData = new FormData(form);
    
    // الحصول على النص العربي للبنك المختار وإرساله كخانة منفصلة
    const bankSelect = document.getElementById('bankSelect');
    const bankFullText = bankSelect.options[bankSelect.selectedIndex].text;
    
    const params = new URLSearchParams(formData);
    params.append('bankFullText', bankFullText); 

    fetch(SCRIPT_URL + "?" + params.toString(), { method: 'GET' })
    .then(res => {
        alert('تم تسجيل البيانات بنجاح في مشروع شركة صندوق مجزية العقاري.');
        form.reset();
        btn.innerText = "إرسال البيانات للنظام";
        btn.disabled = false;
    })
    .catch(err => {
        alert('حدث خطأ، يرجى المحاولة مرة أخرى');
        btn.disabled = false;
        btn.innerText = "إرسال البيانات للنظام";
    });
};
</script>
</body>
</html>
