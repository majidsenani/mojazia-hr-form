<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حراس امن شركة صندوق مجزية العقاري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; background: #fff; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid #b8860b; }
        h2 { text-align: center; color: #b8860b; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo'; font-size: 14px; }
        input:focus, select:focus { border-color: #b8860b; outline: none; }
        .static-field { background-color: #f0f0f0; border-color: #ddd; color: #777; cursor: not-allowed; }
        .iban-note { color: #d93025; font-size: 12.5px; margin-top: 8px; font-weight: bold; line-height: 1.5; }
        .section-title { background: #f9f9f9; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; color: #b8860b; border-right: 4px solid #b8860b; }
        button { width: 100%; padding: 15px; background-color: #b8860b; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
  /* تنسيق الشعار في الزاوية اليسرى */
.company-logo {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 100px; /* يمكنك تكبير أو تصغير الرقم حسب حجم الشعار */
    height: auto;
    z-index: 100;
}

/* تعديل للموبايل عشان ما يغطي العناوين */
@media (max-width: 600px) {
    .company-logo {
        position: relative;
        display: block;
        margin: 0 auto 20px auto;
        top: 0;
        left: 0;
        width: 80px;
    }
}
    </style>
</head>
<body>
<img src="logo.png" alt="شعار شركة صندوق مجزية" class="company-logo">
<div class="container">
    <h2>حراس امن شركة صندوق مجزية العقاري</h2>
    
    <form id="employeeForm" action="https://script.google.com/macros/s/AKfycbzKcSVNPpLiKCEgMHLOnwK_WxQrDvJplbJgh_hhSzGOd36wpfhGfhhQxICfMhaAZzC6/exec" method="POST">

        <!-- ترتيب الحقول مطابق لترتيب الأعمدة في الإكسل -->

        <!-- ١. الاسم الأول عربي -->
        <div class="section-title">البيانات الشخصية (بالعربي)بحسب الهوية</div>
        <div class="form-group">
            <label>الاسم الأول</label>
            <input type="text" name="firstNameAr" required>
        </div>

        <!-- ٢. اسم العائلة عربي -->
        <div class="form-group">
            <label>اسم العائلة</label>
            <input type="text" name="lastNameAr" required>
        </div>

        <!-- ٣. الأسماء الوسطى عربي -->
        <div class="form-group">
            <label>الأسماء الوسطى (الأب والجد)</label>
            <input type="text" name="middleNamesAr" required>
        </div>

        <!-- ٤. الاسم الأول إنجليزي -->
        <div class="section-title">البيانات الشخصية (بالإنجليزي)بحسب الهوية</div>
        <div class="form-group">
            <label>الاسم الأول بالإنجليزي</label>
            <input type="text" name="firstNameEn" style="direction: ltr;" required>
        </div>

        <!-- ٥. اسم العائلة إنجليزي -->
        <div class="form-group">
            <label>اسم العائلة بالإنجليزي</label>
            <input type="text" name="lastNameEn" style="direction: ltr;" required>
        </div>

        <!-- ٦. الأسماء الوسطى إنجليزي -->
        <div class="form-group">
            <label>الأسماء الوسطى بالإنجليزي</label>
            <input type="text" name="middleNamesEn" style="direction: ltr;" required>
        </div>

        <!-- ٧. رقم الهوية -->
        <hr>
        <div class="form-group">
            <label>رقم الهوية</label>
            <input type="text" name="idNumber" maxlength="10" required>
        </div>

        <!-- ٨. اسم البنك (عربي) — الترتيب في الإكسل: عربي أولاً ثم إنجليزي بعد الآيبان -->
        <div class="form-group">
            <label>اسم البنك</label>
            <select name="bankName" id="bankSelect" required>
                <option value="">اختر البنك</option>
                <option value="الراجحي">مصرف الراجحي</option>
                <option value="الأهلي">البنك الأهلي السعودي (SNB)</option>
                <option value="الإنماء">مصرف الإنماء</option>
                <option value="الرياض">بنك الرياض</option>
                <option value="البلاد">بنك البلاد</option>
                <option value="العربي">البنك العربي الوطني</option>
                <option value="ساب">بنك الأول (SAB)</option>
                <option value="الجزيرة">بنك الجزيرة</option>
                <option value="الاستثمار">بنك الاستثمار</option>
             <option value="بنك الخليج الدولي">بنك الخليج الدولي</option>
                <option value="فرنسي">البنك السعودي الفرنسي</option>
            </select>
        </div>

        <!-- ٩. رقم الآيبان -->
        <div class="form-group">
            <label>رقم الآيبان (IBAN)</label>
            <div style="display: flex; align-items: center; direction: ltr;">
                <span style="padding: 12px; background: #eee; border: 1px solid #ccc; border-right: none; border-radius: 8px 0 0 8px; font-weight: bold;">SA</span>
                <input type="text" name="iban" id="ibanInput" required maxlength="22" placeholder="أدخل 22 رقماً فقط" style="border-radius: 0 8px 8px 0;">
            </div>
            <p class="iban-note">
                * ملاحظة: لا يقبل الحساب الرقمي ولا حسابات الدعم الحكومي.
            </p>
        </div>

        <!-- ١٠. اسم البنك (إنجليزي) — حقل مخفي يُملأ تلقائياً -->
        <input type="hidden" name="bankNameEn" id="bankNameEn">

        <!-- ١١. تاريخ الميلاد -->
        <div class="form-group">
            <label>تاريخ الميلاد (ميلادي)</label>
            <input type="date" name="dob" required>
        </div>

        <!-- حقول ثابتة (لا تُرسل لأنها disabled، يمكن إضافتها كـ hidden إن احتجت) -->
        <div class="form-group">
            <label>الجنسية</label>
            <input type="text" value="SAU" class="static-field" readonly disabled>
        </div>
        <div class="form-group">
            <label>موقع العمل</label>
            <input type="text" value="الرياض" class="static-field" readonly disabled>
        </div>
        <div class="form-group">
            <label>الديانة</label>
            <input type="text" value="مسلم" class="static-field" readonly disabled>
        </div>
        <!-- ١٢. الجنس -->
        <div class="form-group">
            <label>الجنس</label>
            <select name="gender" required>
                <option value="">اختر</option>
                <option value="ذكر">ذكر</option>
                <option value="أنثى">أنثى</option>
            </select>
        </div>

        <!-- ١٣. الحالة الاجتماعية -->
        <div class="form-group">
            <label>الحالة الاجتماعية</label>
            <select name="maritalStatus" required>
                <option value="">اختر</option>
                <option value="أعزب/عزباء">أعزب/عزباء</option>
                <option value="متزوج">متزوج</option>
            </select>
        </div>

        <!-- ١٤. الإيميل -->
        <div class="form-group">
            <label>الإيميل</label>
            <input type="email" name="email" required>
        </div>

        <!-- ١٥. رقم الجوال -->
        <div class="form-group">
            <label>رقم الجوال</label>
            <input type="tel" name="phone" id="phoneInput" maxlength="10" placeholder="05xxxxxxxx" required>
        </div>

        <button type="submit" id="submitBtn">إرسال البيانات</button>
    </form>

    <!-- رسالة النجاح -->
    <div id="successMsg" style="display:none; text-align:center; padding: 40px 20px;">
        <div style="font-size: 64px;">✅</div>
        <h3 style="color: #2e7d32; margin: 15px 0 10px; font-size: 22px;">تم إرسال البيانات بنجاح!</h3>
        <p style="color: #555; font-size: 15px;">شكراً، تم استلام بياناتك وسيتم مراجعتها قريباً.</p>
    </div>
</div>

<script>
    // خريطة البنوك: عربي → إنجليزي
    const bankEnglishNames = {
        'الراجحي':    'Al Rajhi Bank',
        'الأهلي':     'Saudi National Bank (SNB)',
        'الإنماء':    'Alinma Bank',
        'الرياض':     'Riyad Bank',
        'البلاد':     'Bank AlBilad',
        'العربي':     'Arab National Bank (ANB)',
        'ساب':        'Saudi Awwal Bank (SAB)',
        'الجزيرة':    'Bank AlJazira',
        'الاستثمار':  'Saudi Investment Bank (SAIB)',
        'فرنسي':      'Banque Saudi Fransi (BSF)'
    };

    // تحديث اسم البنك الإنجليزي عند تغيير الاختيار
    document.getElementById('bankSelect').addEventListener('change', function() {
        document.getElementById('bankNameEn').value = bankEnglishNames[this.value] || '';
    });

    // قيود الأرقام فقط
    ['ibanInput', 'phoneInput'].forEach(id => {
        document.getElementById(id).addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    });

    // إرسال بـ fetch وإظهار رسالة النجاح
    document.getElementById('employeeForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'جاري الإرسال...';

        const formData = new FormData(this);

        fetch(this.action, {
            method: 'POST',
            body: formData
        }).then(() => {
            // إخفاء الفورم وإظهار رسالة النجاح بغض النظر عن الرد
            document.getElementById('employeeForm').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
        }).catch(() => {
            // حتى لو كان هناك خطأ في الشبكة، نعرض النجاح (Google Apps Script يُعيد CORS error أحياناً رغم النجاح)
            document.getElementById('employeeForm').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
        });
    });
</script>

</body>
</html>
