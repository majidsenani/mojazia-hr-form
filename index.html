<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركة صندوق مجزية العقاري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; background: #fff; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid #b8860b; }
        h2 { text-align: center; color: #b8860b; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo'; font-size: 14px; }
        input:focus { border-color: #b8860b; outline: none; box-shadow: 0 0 5px rgba(184, 134, 11, 0.2); }
        .static-field { background-color: #f0f0f0; border-color: #ddd; color: #777; cursor: not-allowed; }
        
        .iban-note { color: #d93025; font-size: 12.5px; margin-top: 8px; font-weight: bold; line-height: 1.5; }

        button { width: 100%; padding: 15px; background-color: #b8860b; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #946d0a; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>شركة صندوق مجزية العقاري</h2>
    <hr>
    
    <form id="employeeForm">
        <div class="form-group">
            <label>الاسم الأول</label>
            <input type="text" name="firstName" required>
        </div>
        
        <div class="form-group">
            <label>الأسماء الوسطى (الأب والجد)</label>
            <input type="text" name="middleNames" required>
        </div>

        <div class="form-group">
            <label>اسم العائلة</label>
            <input type="text" name="lastName" required>
        </div>

        <!-- الاسم بالإنجليزي مقسم -->
        <div class="form-group">
            <label>الاسم الأول بالإنجليزي</label>
            <input type="text" name="enFirstName" required style="direction: ltr; text-align: left;">
        </div>

        <div class="form-group">
            <label>الاسم الأوسط بالإنجليزي</label>
            <input type="text" name="enMiddleName" required style="direction: ltr; text-align: left;">
        </div>

        <div class="form-group">
            <label>اسم العائلة بالإنجليزي</label>
            <input type="text" name="enLastName" required style="direction: ltr; text-align: left;">
        </div>

        <div class="form-group">
            <label>رقم الهوية</label>
            <input type="text" name="idNumber" maxlength="10" pattern="\d{10}" required>
        </div>

        <div class="form-group">
            <label>رقم الآيبان (IBAN)</label>
            <div style="display: flex; align-items: center; direction: ltr;">
                <span style="padding: 12px; background: #eee; border: 1px solid #ccc; border-right: none; border-radius: 8px 0 0 8px; font-weight: bold;">SA</span>
                <input type="text" id="ibanInput" name="iban" required maxlength="22" pattern="\d{22}" style="border-radius: 0 8px 8px 0;">
            </div>
            <p class="iban-note">
                * تنبيه: لا يقبل الحساب الرقمي (مثل stc pay / urpay) ولا يقبل حسابات الدعم الحكومي. يجب أن يكون حساباً بنكياً جارياً.
            </p>
        </div>

        <div class="form-group">
            <label>تاريخ الميلاد (ميلادي)</label>
            <input type="date" name="dob" required>
        </div>

        <div class="form-group">
            <label>الجنسية</label>
            <input type="text" value="SAU" class="static-field" readonly>
        </div>

        <div class="form-group">
            <label>موقع العمل</label>
            <input type="text" value="الرياض" class="static-field" readonly>
        </div>

        <div class="form-group">
            <label>الديانة</label>
            <input type="text" value="مسلم" class="static-field" readonly>
        </div>

        <div class="form-group">
            <label>الجنس</label>
            <select name="gender" required>
                <option value="">اختر الجنس</option>
                <option value="ذكر">ذكر</option>
                <option value="أنثى">أنثى</option>
            </select>
        </div>

        <div class="form-group">
            <label>الحالة الاجتماعية</label>
            <select name="maritalStatus" required>
                <option value="">اختر الحالة</option>
                <option value="أعزب/عزباء">أعزب/عزباء</option>
                <option value="متزوج">متزوج</option>
            </select>
        </div>

        <div class="form-group">
            <label>الإيميل</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>رقم الجوال</label>
            <input type="tel" name="phone" pattern="05\d{8}" maxlength="10" required>
        </div>

        <button type="submit">إرسال البيانات</button>
    </form>
</div>

<script>
    const numericFields = ['ibanInput', 'idNumber', 'phone'];
    numericFields.forEach(id => {
        const el = document.getElementsByName(id)[0] || document.getElementById(id);
        if(el) {
            el.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '');
            });
        }
    });

    document.getElementById('employeeForm').onsubmit = function(e) {
        e.preventDefault();
        alert('تم إرسال بياناتك بنجاح');
        this.reset();
    };
</script>

</body>
</html>
